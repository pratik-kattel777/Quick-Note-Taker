<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Quick Note Taker</title>

    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            background: #f4f4f4;
        }

        textarea {
            width: 95%;
            height: 60vh;
            font-size: 18px;
            padding: 15px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #316357;
            color: white;
            border: none;
            cursor: pointer;
        }
        *{box-sizing: border-box; margin: 0; padding: 0;}
        body
    </style>
</head>

<body>
    <div id = "app">
    <!--sidebar-->
    <div id = "sidebar">
        <button id="new-note">🆕New Note</button>
        <div id = "notes-list"></div>
    </div>

     <!-- Editor -->
     <div id = "editor">
         <input type="text" id="note-title" placeholder="Note Title">
         <textarea id="note-content" placeholder="Start typing your note..."></textarea>
         <div id=" toolbar">
            <button id="new-note">🆕 New Note</button>
            <button id="open-file">📂 Open File</button>
            <button id="save">💾 Save Note</button>
            <button id="save-as">&#128193; Save As</button>
        </div>
        <p id="save_status"></p>
     </div>
 </div>
 <script src="renderer.js"></script>

</body>

</html>
