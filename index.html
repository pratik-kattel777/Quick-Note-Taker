<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Quick Note Taker</title>

    <style>
      :root {
    --bg-primary: #f4f4f4;
    --bg-sidebar: #b2b2bb;
    --bg-editor: #ffffff;
    --bg-note-item: #3a3a3a;
    --bg-note-item-hover: #4a4a4a;
    --bg-note-item-active: #316357;

    --text-primary: #000000;
    --text-sidebar: #ffffff;
    --text-muted: #999999;

    --border-color: #cccccc;

    --button-bg: #316357;
    --button-hover: #3d7a6b;
}

body.dark-mode {
    --bg-primary: #1e1e1e;
    --bg-sidebar: #141414;
    --bg-editor: #252525;
    --bg-note-item: #2a2a2a;
    --bg-note-item-hover: #333333;
    --bg-note-item-active: #316357;

    --text-primary: #f0f0f0;
    --text-sidebar: #dddddd;
    --text-muted: #777777;

    --border-color: #444444;

    --button-bg: #316357;
    --button-hover: #3d7a6b;
}
  body {
            font-family: system-ui;
            padding: 20px;
            background: var(--bg-primary);
            height: 100vh;
        }

        textarea {
            flex: 1;
            width: 95%;
            height: 60vh;
            font-size: 16px;
            padding: 12px;
            resize: none;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            background: var(--button-bg);
            color: white;
            border: none;
            cursor: pointer;
        }
     * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: system-ui;
    background: var(--bg-primary);
    height: 100vh;
  }

  #app {
    display: flex;
    height: 100vh;
  }

  #sidebar {
    width: 220px;
    background: var(--bg-sidebar);
    color: var(--text-sidebar);
    display: flex;
    flex-direction: column;
    padding: 10px;
    gap: 8px;
  }

  #note-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #editor {
    background: var(--bg-editor);
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 15px;
    gap: 10px;
  }

  #note-title {
    font-size: 18px;
    padding: 8px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: var(--text-primary);
  }

  textarea {
    flex: 1;
    font-size: 16px;
    padding: 12px;
    resize: none;
    border: 1px solid #ccc;
    border-radius: 6px;
  }

  #toolbar {
    display: flex;
    gap: 8px;
  }

  button {
    padding: 8px 12px;
    font-size: 14px;
    background: var(--button-bg);
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 8px;
  }

  button:hover {
    background: var(--button-hover);
  }

  #new-note {
    width: 100%;
    margin-bottom: 6px;
  }

  .note-item {
    background: var(--bg-note-item);
    border-radius: 6px;
    padding: 8px;
    cursor: pointer;
  }

  .note-item:hover {
    background: var(--bg-note-item-hover);
  }

  .note-item.active {
    background: var(--bg-note-item-active);
  }

  .note-item-title {
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .note-item-date {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .note-item-delete {
    background: transparent;
    color: #ff6b6b;
    border: none;
    font-size: 12px;
    float: right;
    padding: 0;
    cursor: pointer;
  }

  #save_status {
    font-size: 13px;
    color: var(--text-muted);
  }
  #word-count {
    font-size: 12px;
    color: var(--text-muted);
  }
#search {
    padding: 7px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 13px;
    width: 100%;
  }

    </style>
</head>

<body>
    <div id="app">
        <!--sidebar-->
        <div id="sidebar">
            <button id="new-note">🆕New Note</button>
            <input type="text" id="search" placeholder="Search notes..."> <!-- Search bar for filtering notes -->
            <div id="notes-list"></div>
        </div>
        <!--editor-->
        <div id="editor">
            <input type="text" id="note-title" placeholder="Note Title...">
            <textarea id="note" placeholder="Start typing your note..."></textarea>
            <div id="toolbar">
                <button id="save">💾Save</button>
                <button id="save-as">&#128193;Save As</button>
                <button id="open-file">📂Open File</button>
                <button id="font-increase">A+</button>
                <button id="font-decrease">A-</button>
                <button id="dark-mode-toggle">🌙 Dark Mode</button>
            </div>
            <p id="save_status"></p>
            <p id="word-count">Word Count: 0 | Character Count: 0</p>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>

</html>
